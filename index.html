<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phan Quốc Thái</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(40,80,140,0.25) 0%, rgba(10,15,25,0.95) 35%, #000 100%);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.9) 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 80% 20%, rgba(255,255,255,0.7) 50%, transparent 51%),
        radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.6) 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 35% 80%, rgba(255,255,255,0.8) 50%, transparent 51%),
        radial-gradient(2px 2px at 75% 60%, rgba(255,255,255,0.7) 50%, transparent 51%);
      opacity: 0.45;
      filter: blur(0.2px);
    }

    .name {
      position: relative;
      z-index: 2;
      font-size: clamp(44px, 8vw, 96px);
      font-weight: 800;
      letter-spacing: 2px;
      color: #f4fbff;
      text-shadow:
        0 0 8px rgba(120,190,255,0.65),
        0 0 22px rgba(80,160,255,0.35),
        0 0 40px rgba(60,120,255,0.18);
      white-space: nowrap;
      padding-right: 6px;
    }

    .cursor {
      display: inline-block;
      width: 0.6ch;
      color: #d9f1ff;
      animation: blink 0.8s infinite;
      transform: translateY(-1px);
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    #snow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .floor-glow {
      position: fixed;
      left: 50%;
      bottom: 8%;
      transform: translateX(-50%);
      width: 52vw;
      height: 16vw;
      min-width: 320px;
      max-width: 900px;
      background: radial-gradient(circle, rgba(70,160,255,0.18) 0%, rgba(0,0,0,0) 70%);
      filter: blur(12px);
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="floor-glow"></div>
  <canvas id="snow"></canvas>

  <h1 class="name" id="name"></h1><span class="cursor">|</span>

  <script>
    // Typing effect
    const text = "Phan Quốc Thái";
    const nameEl = document.getElementById("name");
    let i = 0;

    function typeText() {
      if (i <= text.length) {
        nameEl.textContent = text.slice(0, i);
        i++;
        setTimeout(typeText, 150);
      }
    }
    typeText();

    // Snow effect
    const canvas = document.getElementById("snow");
    const ctx = canvas.getContext("2d");
    let w, h, flakes;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      flakes = [];
      const count = Math.floor((w * h) / 18000);
      for (let i = 0; i < count; i++) {
        flakes.push(createFlake(true));
      }
    }

    function createFlake(initial = false) {
      return {
        x: Math.random() * w,
        y: initial ? Math.random() * h : -10,
        r: Math.random() * 2.6 + 0.8,
        s: Math.random() * 1.6 + 0.6,
        a: Math.random() * Math.PI * 2,
        d: Math.random() * 0.8 + 0.2
      };
    }

    function draw() {
      ctx.clearRect(0, 0, w, h);

      for (let f of flakes) {
        f.y += f.s;
        f.x += Math.sin(f.a) * f.d;
        f.a += 0.01;

        if (f.y > h + 10) {
          Object.assign(f, createFlake(false));
          f.y = -10;
        }

        if (f.x > w + 10) f.x = -10;
        if (f.x < -10) f.x = w + 10;

        ctx.beginPath();
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener("resize", resize);
    resize();
    draw();
  </script>
</body>
</html>
